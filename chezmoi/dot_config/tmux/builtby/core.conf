# =============================================================================
# builtby.win tmux core profile
# Shared options only (no key remaps).
# =============================================================================

# General
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -s escape-time 0
set -g default-terminal "tmux-256color"
set -g terminal-overrides "*256col*:Tc,xterm-256color:Usync"
set -s extended-keys on
# Replace tmux's default xterm feature list so it does not advertise `ccolour`.
# `ccolour` enables terminal colour/theme reports, which can leak replies such as
# OSC 10/11 or CSI ?997 into panes. If this happens while tmux is in the prefix
# key table, those reply bytes can trigger pane/window bindings.
set -g terminal-features 'xterm*:clipboard:cstyle:title:extkeys,screen*:title,rxvt*:ignorefkeys,xterm-ghostty:hyperlinks'
# Keep passthrough disabled by default. Some terminals answer passthrough color or
# feature queries on stdin, which can leak literal OSC/CSI replies into panes
# (for example `]10;rgb:...`, `]11;rgb:...`, or `[?997;1n`). If you need inline
# graphics or another passthrough-only feature, re-enable this machine-locally in
# ~/.tmux.local.conf with: set -g allow-passthrough on
set -g allow-passthrough off
# Keep focus reporting disabled by default. Terminal focus-in reports end with `I`;
# if an app focus hop leaks that sequence into a pane, it looks like phantom input.
# Re-enable locally only for apps that explicitly need focus notifications.
set -g focus-events off
set -s set-clipboard external
set -g update-environment "*"
# New sessions should not create extra panes/windows unless explicitly requested.
# Opt in per machine with: set -g @builtby_bootstrap_layout on
set -g @builtby_bootstrap_layout off

# Pane appearance
set -g pane-border-style 'fg=brightblack'
set -g pane-active-border-style 'fg=blue'

# Status bar
set -g status on
set -g status-position bottom
set -g status-style 'bg=default fg=white'
set -g status-left '#[fg=blue,bold][#S]#[fg=brightblack]:#[fg=cyan]#I#[fg=brightblack]:#[fg=magenta]#P '
set -g status-left-length 30
set -g window-status-style 'fg=brightblack,bg=default'
set -g window-status-current-style 'fg=blue,bg=default,bold'
set -g window-status-format '#I:#W'
set -g window-status-current-format '[#I:#W]'
set -g window-status-separator ' '
set -g status-right '#{?client_prefix,#[fg=yellow bold] LEADER ,}#[fg=brightblack] %H:%M:%S #{continuum_status}'

# Window naming
set -g automatic-rename on
set -g automatic-rename-format '#(if [ -x "$HOME/.config/tmux/window-name.sh" ]; then "$HOME/.config/tmux/window-name.sh" "#{pane_current_path}" "#{pane_current_command}"; else basename "#{pane_current_path}"; fi)'
set-hook -g session-created 'run-shell -b "$HOME/.config/tmux/session-bootstrap.sh \"#{session_name}\" \"#{session_path}\""'
set-hook -ug after-new-window[8921]
set-hook -ug after-select-window[8921]
set-hook -ug after-rename-window[8921]
set -gu @resurrect-hook-pre-restore-all
set -gu @resurrect-hook-post-restore-all

# Do not source mutable app-generated tmux configs from the base profile. Older
# Back2Vibing installs used pane-focus-in/after-select-pane hooks that fired on
# focus changes and made tmux reload/focus behavior noisy. Back2Vibing can install
# its own hook when needed; the dotfiles baseline clears stale hooks.
set-option -gu pane-focus-in
set-hook -gu after-select-pane

# Reloading while a client is waiting for a prefix key can leave random terminal
# reply bytes to be interpreted as tmux commands. Always return attached clients
# to the root key table after loading this profile.
if -F '#{client_name}' 'switch-client -T root'
