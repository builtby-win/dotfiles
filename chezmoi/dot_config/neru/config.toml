[general]
passthrough_unbounded_keys = true
should_exit_after_passthrough = false

[hotkeys]
"Primary+Shift+Space" = "__disabled__"
"Primary+Shift+G" = "__disabled__"
"Primary+Shift+C" = "__disabled__"
"Primary+Shift+S" = "__disabled__"
"Cmd+Ctrl+Alt+Shift+K" = ["exec ~/.local/bin/kanata-layer neruscroll", "scroll"]
"Cmd+Ctrl+Alt+Shift+L" = "hints"
"Cmd+Ctrl+Alt+Shift+;" = "recursive_grid --cursor-selection-mode follow"
"Cmd+Ctrl+Alt+Shift+'" = "grid --cursor-selection-mode follow"

[theme.light]
surface = "#EEF2FF"
accent = "#465FBC"
accent_alt = "#0B2377"
on_accent_alt = "#F8FAFF"
text = "#17327A"

[theme.dark]
surface = "#0A1338"
accent = "#6E82D6"
accent_alt = "#8FA2F0"
on_accent_alt = "#081022"
text = "#E8EEFF"

[hints]
hint_characters = "asdfghjkl"
parallel_threshold = 20
detect_mission_control = false

[hints.hotkeys]
"Escape" = "idle"
"Backspace" = "action backspace"
"Return" = ["action left_click", "idle"]
"Shift+L" = ["action left_click", "idle"]
"Shift+R" = ["action right_click", "idle"]
"Shift+Return" = "action left_click"

[hints.additional_ax_support]
enable = true
additional_electron_bundles = []
additional_chromium_bundles = []
additional_firefox_bundles = []

[grid]
prewarm_enabled = true
live_match_update = true
hide_unmatched = true

[grid.hotkeys]
"," = "action reset"
"'" = "action reset"
"Return" = ["action left_click", "idle"]
"Shift+Return" = "action left_click"

[recursive_grid]
grid_cols = 2
grid_rows = 2
keys = "uijk"
min_size_width = 30
min_size_height = 30
max_depth = 8

[recursive_grid.hotkeys]
"Return" = ["action left_click", "idle"]
"Shift+Return" = "action left_click"

[recursive_grid.ui]
label_background = true
sub_key_preview = true

[scroll]
scroll_step = 40
scroll_step_half = 500

[scroll.hotkeys]
"Escape" = ["exec ~/.local/bin/kanata-layer base", "idle"]
"k" = "action scroll_up"
"j" = "action scroll_down"
"h" = "action scroll_left"
"l" = "action scroll_right"
"gg" = "action go_top"
"Shift+G" = "action go_bottom"
"u" = "action page_up"
"PageUp" = "action page_up"
"d" = "action page_down"
"PageDown" = "action page_down"
"Shift+L" = ["action left_click", "exec ~/.local/bin/kanata-layer base", "idle"]
"Shift+R" = ["action right_click", "exec ~/.local/bin/kanata-layer base", "idle"]
"Shift+M" = ["action middle_click", "exec ~/.local/bin/kanata-layer base", "idle"]
"Shift+I" = ["action mouse_down", "exec ~/.local/bin/kanata-layer base", "idle"]
"Shift+U" = ["action mouse_up", "exec ~/.local/bin/kanata-layer base", "idle"]
"Up" = ["action move_mouse_relative --dx=0 --dy=-10", "exec ~/.local/bin/kanata-layer base", "idle"]
"Down" = ["action move_mouse_relative --dx=0 --dy=10", "exec ~/.local/bin/kanata-layer base", "idle"]
"Left" = ["action move_mouse_relative --dx=-10 --dy=0", "exec ~/.local/bin/kanata-layer base", "idle"]
"Right" = ["action move_mouse_relative --dx=10 --dy=0", "exec ~/.local/bin/kanata-layer base", "idle"]
"a" = ["exec ~/.local/bin/kanata-layer base", "idle"]
"b" = ["exec ~/.local/bin/kanata-layer base", "idle"]
"c" = ["exec ~/.local/bin/kanata-layer base", "idle"]
"e" = ["exec ~/.local/bin/kanata-layer base", "idle"]
"f" = ["exec ~/.local/bin/kanata-layer base", "idle"]
"i" = ["exec ~/.local/bin/kanata-layer base", "idle"]
"m" = ["exec ~/.local/bin/kanata-layer base", "idle"]
"n" = ["exec ~/.local/bin/kanata-layer base", "idle"]
"o" = ["exec ~/.local/bin/kanata-layer base", "idle"]
"p" = ["exec ~/.local/bin/kanata-layer base", "idle"]
"q" = ["exec ~/.local/bin/kanata-layer base", "idle"]
"r" = ["exec ~/.local/bin/kanata-layer base", "idle"]
"s" = ["exec ~/.local/bin/kanata-layer base", "idle"]
"t" = ["exec ~/.local/bin/kanata-layer base", "idle"]
