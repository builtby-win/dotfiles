[mode_indicator.scroll]
enabled = true
text = "Scroll"

[mode_indicator.hints]
enabled = true
text = "Hints"

[mode_indicator.grid]
enabled = true
text = "Grid"

[mode_indicator.recursive_grid]
enabled = true
text = "Recursive"

[virtual_pointer.ui]
size = 4

[smooth_cursor]
move_mouse_enabled = true
steps = 12
max_duration = 180
duration_per_pixel = 0.12
